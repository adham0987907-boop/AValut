name: Avault
description: A secure photo & video vault with biometric + PIN lock.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  local_auth: ^2.1.7
  flutter_secure_storage: ^9.0.0
  encrypt: ^5.0.1
  image_picker: ^1.0.7
  path_provider: ^2.1.3
  crypto: ^3.0.3

flutter_launcher_icons: ^0.13.1 # ضيف السطر ده

flutter:
  uses-material-design: true

flutter_icons: # وضيف البلوك ده كله في الآخر
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon.png"
  min_sdk_android: 21 # عشان الأيقونات المدورة تشتغل
