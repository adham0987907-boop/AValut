workflows:
  android-debug:
    name: A Vault Fresh Build
    max_build_duration: 60
    environment:
      flutter: stable
    scripts:
      - name: Recreate Android Folder V2
        script: |
          flutter create . --platforms=android --org com.example --project-name a_vault
      - name: Get packages
        script: flutter pub get
      - name: Build APK Debug
        script: flutter build apk --debug
    artifacts:
      - build/app/outputs/flutter-apk/app-debug.apk
